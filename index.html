<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON 생성 및 다운로드</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
        }
        h2 {
            margin-top: 0;
            color: #333;
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #495057;
        }
        input[type="text"], input[type="number"], select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        textarea {
            resize: vertical;
            height: 80px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-primary {
            background-color: #007bff;
            color: white;
        }
        .btn-primary:hover {
            background-color: #0056b3;
        }
        .btn-secondary {
            background-color: #6c757d;
            color: white;
        }
        .btn-secondary:hover {
            background-color: #545b62;
        }
        .preview-box {
            margin-top: 20px;
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            padding: 15px;
            border-radius: 4px;
            white-space: pre-wrap;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>JSON 파일 생성기</h2>
    <form id="jsonForm">
        <!-- 예시 파라미터 구성 (필요에 따라 이 부분을 수정하세요) -->
        <div class="form-group">
            <label for="title">제목 (Title)</label>
            <input type="text" id="title" name="title" placeholder="제목을 입력하세요" required>
        </div>

        <div class="form-group">
            <label for="version">버전 (Version)</label>
            <input type="text" id="version" name="version" placeholder="1.0.0" required>
        </div>

        <div class="form-group">
            <label for="author">작성자 (Author)</label>
            <input type="text" id="author" name="author" placeholder="이름을 입력하세요">
        </div>

        <div class="form-group">
            <label for="description">설명 (Description)</label>
            <textarea id="description" name="description" placeholder="상세 설명을 입력하세요"></textarea>
        </div>

        <div class="btn-group">
            <button type="button" class="btn-secondary" onclick="previewJSON()">미리보기</button>
            <button type="button" class="btn-primary" onclick="downloadJSON()">JSON 다운로드</button>
        </div>
    </form>

    <div id="preview" class="preview-box"></div>
</div>

<script>
    // 폼 데이터를 객체로 변환하는 함수
    function generateDataObject() {
        const title = document.getElementById('title').value;
        const version = document.getElementById('version').value;
        const author = document.getElementById('author').value;
        const description = document.getElementById('description').value;

        // 생성할 JSON 구조 정의
        return {
            title: title || "",
            version: version || "1.0.0",
            meta: {
                author: author || "Unknown",
                createdAt: new Date().toISOString().split('T')[0]
            },
            description: description || ""
        };
    }

    // 화면에 JSON 미리보기 출력
    function previewJSON() {
        const data = generateDataObject();
        const previewBox = document.getElementById('preview');
        
        previewBox.textContent = JSON.stringify(data, null, 4);
        previewBox.style.display = 'block';
    }

    // JSON 파일 다운로드 트리거
    function downloadJSON() {
        const data = generateDataObject();
        const jsonString = JSON.stringify(data, null, 4);
        
        // Blob 객체 생성
        const blob = new Blob([jsonString], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        
        // 다운로드용 링크 생성 및 클릭
        const link = document.createElement('a');
        
        // 파일명 설정 (제목을 활용하거나 기본값 사용)
        const filename = (data.title ? data.title.replace(/[^a-zA-Z0-9가-힣]/g, "_") : "data") + ".json";
        
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        
        // 사용 후 URL 객체 해제 및 요소 제거
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }
</script>

</body>
</html>
