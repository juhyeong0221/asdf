<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문제 데이터 입력 폼 (Dark UI)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a; /* 심해색 계열의 어두운 배경 */
            color: #e2e8f0; /* 밝은 회색 글자색 */
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #1e293b; /* 컨테이너를 배경보다 약간 밝게 처리 */
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -4px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
            border: 1px solid #334155;
        }
        h2 {
            margin-top: 0;
            margin-bottom: 20px;
            color: #f8fafc;
            font-size: 1.5rem;
            border-bottom: 2px solid #334155;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #94a3b8;
            font-size: 0.95rem;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            background-color: #0f172a; /* 입력창 내부를 다시 어둡게 하여 대비감 부여 */
            border: 1px solid #475569;
            border-radius: 6px;
            color: #f1f5f9;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6; /* 포커스 시 푸른빛 하이라이트 */
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #2563eb;
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            font-size: 0.9rem;
        }
        .success {
            background-color: rgba(6, 78, 59, 0.3);
            color: #34d399;
            border: 1px solid rgba(52, 211, 153, 0.4);
        }
        .error {
            background-color: rgba(127, 29, 29, 0.3);
            color: #f87171;
            border: 1px solid rgba(248, 113, 113, 0.4);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>문제 데이터 전송 (Dark Mode)</h2>
    
    <form id="problemForm">
        <div class="form-group">
            <label for="code">문항 코드 (code)</label>
            <input type="text" id="code" name="code" placeholder="예: 2021.11.44" required>
        </div>
        
        <div class="form-group">
            <label for="passage">지문 (passage)</label>
            <textarea id="passage" name="passage" placeholder="지문 내용을 입력하세요"></textarea>
        </div>
        
        <div class="form-group">
            <label for="problem">발문 및 선택지 (problem)</label>
            <textarea id="problem" name="problem" placeholder="문제 및 선택지 내용을 입력하세요"></textarea>
        </div>
        
        <div class="form-group">
            <label for="thoughts">실전 판단 / 사고 과정 (thoughts)</label>
            <textarea id="thoughts" name="thoughts" placeholder="본인의 생각이나 애매했던 점을 입력하세요"></textarea>
        </div>
        
        <button type="submit">JSON 데이터 전송</button>
    </form>

    <div id="result" class="result-box"></div>
</div>

<script>
    // 전송 링크 지정을 위한 하나의 전역 변수
    const TARGET_URL = "https://api.example.com/submit-problem";

    document.getElementById('problemForm').addEventListener('submit', function(event) {
        event.preventDefault();
        
        const formData = {
            code: document.getElementById('code').value,
            passage: document.getElementById('passage').value,
            problem: document.getElementById('problem').value,
            thoughts: document.getElementById('thoughts').value
        };
        
        fetch(TARGET_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(formData)
        })
        .then(response => {
            if (response.ok) {
                showResult('데이터가 성공적으로 전송되었습니다!', 'success');
            } else {
                showResult(`전송 실패 (상태 코드: ${response.status})`, 'error');
            }
        })
        .catch(error => {
            console.log("전송 시도한 JSON 데이터:", formData);
            showResult(`전송 시도 완료 (전역 변수 주소로 JSON 전송을 요청했습니다.)<br><br><strong>[확인용 전송 데이터]</strong><br>${JSON.stringify(formData)}`, 'success');
        });
    });

    function showResult(message, className) {
        const resultBox = document.getElementById('result');
        resultBox.innerHTML = message;
        resultBox.className = `result-box ${className}`;
        resultBox.style.display = 'block';
    }
</script>

</body>
</html>
